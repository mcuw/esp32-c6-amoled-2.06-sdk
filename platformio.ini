; https://docs.platformio.org/en/latest/platforms/espressif32.html

[platformio]
boards_dir = ./boards
default_envs = esp32_c6_amoled_2_06

; uncomment to build an example
; src_dir = ./examples/Arduino/serialport
; src_dir = ./examples/Arduino/gfx
; src_dir = ./examples/Arduino/low-energy-consumption
; src_dir = ./examples/Arduino/esp-now-le

[env]
build_flags =
    ; to use e.g. as part of the firmware name 
    '-DPIOENV="${PIOENV}"'
 
    ; coding_standards
    -Wno-unused-variable
    -Wno-unused-but-set-variable
    -Wunreachable-code

    ; debug level 5=VERBOSE https://docs.platformio.org/en/latest/platforms/espressif32.html#debug-level
    ;  -DCORE_DEBUG_LEVEL=5
extra_scripts = pre:extra_script.py
framework = arduino
lib_deps =
  ; button handling library with support for single, double and long clicks
  ; https://registry.platformio.org/libraries/mathertel/OneButton
  mathertel/OneButton @ ^2.6.2

  ; XPowersLib - power management series library for ESP32, including PSRAM power management
  ; https://registry.platformio.org/libraries/lewisxhe/XPowersLib
  lewisxhe/XPowersLib @ ^0.3.3

  ; GFX Library - Core graphics library for displays, providing basic graphics primitives
  ; https://registry.platformio.org/libraries/moononournation/GFX%20Library%20for%20Arduino
  moononournation/GFX Library for Arduino @ ^1.6.5

  ; place global libs here, they will be inherited by other envs
monitor_speed = 115200
; see pioarduino versions: https://github.com/pioarduino/platform-espressif32/releases
upload_speed = 921600
; uncomment and configure when you have multiple ESPs connected
; upload_port = /dev/tty.usbserial-...
; monitor_port = /dev/tty.usbserial-...

[extra]
; use a custom pioarduino platform version with support for ESP32-C6 and PSRAM
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip

lib_deps_builtin =
  SPI
  Wire

; ************
; * base env *
; ************

[esp32]
platform = ${extra.platform}
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ; extend libs only for esp32 based modules here

[esp32c6]
extends = esp32
build_flags =
    ${env.build_flags}
lib_deps =
    ${env.lib_deps}
    ${extra.lib_deps_builtin}
    ; extend libs only for esp32c6 based modules here

; ************
; * ESP32-C6 *
; ************
; devkitc-1: https://docs.espressif.com/projects/espressif-esp-dev-kits/en/latest/esp32c6/esp32-c6-devkitc-1/index.html
; devkitm-1: https://docs.espressif.com/projects/espressif-esp-dev-kits/en/latest/esp32c6/esp32-c6-devkitm-1/index.html

[env:esp32_c6_amoled_2_06]
extends = esp32c6
board = esp32-c6-n16
board_build.partitions = partitions/partitions_16mb_ota_phy.csv
board_build.variant = ${PIOENV}
board_build.variants_dir = variants
build_flags =
    ${esp32c6.build_flags}
    -D ARDUINO_ESP32_C6_AMOLED_2_06
    -D HAS_BUTTON