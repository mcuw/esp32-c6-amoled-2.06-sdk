; https://docs.platformio.org/en/latest/platforms/espressif32.html

[platformio]
boards_dir = ./boards
default_envs = esp32_c6_amoled_2_06
; https://docs.platformio.org/en/latest/projectconf/sections/platformio/options/generic/extra_configs.html
extra_configs =
    ; base envs to extend from, e.g. for different board variants
    extra_configs/base_envs.ini
    ; place your global library dependencies here, it will use in all envs
    extra_configs/lib_deps.ini
    ; The upload_config.ini is in used by ./examples/Arduino/ota-wifi
    ; make sure to upload once with an USB connection first to set up the Wi-Fi credentials and OTA parameters,
    ; configure the upload parameters in extra_configs/upload_config.ini
    ; uncomment the following line to upload with OTA via Wi-Fi AP mode
    ; extra_configs/upload_config.ini

; uncomment to build an example
; src_dir = ./examples/Arduino/serialport
; src_dir = ./examples/Arduino/gfx
; src_dir = ./examples/Arduino/button
; src_dir = ./examples/Arduino/rtos-task
; src_dir = ./examples/Arduino/ota-wifi
src_dir = ./examples/Arduino/github-ota

[env]
extra_scripts = pre:extra_script.py
framework = arduino
; platformio, see https://github.com/platformio/platform-espressif32/releases
platform = espressif32@6.13.0
monitor_speed = 115200
upload_speed = 921600
; uncomment and configure when you have multiple ESPs connected
; upload_port = /dev/tty.usbserial-...
; monitor_port = /dev/tty.usbserial-...
; Possible values: "littlefs", "spiffs", "fatfs"
board_build.filesystem = littlefs
build_flags =
    ; to use e.g. as part of the firmware name 
    '-DPIOENV="${PIOENV}"'
 
    ; coding_standards (works only with platformio and not with pioarduino)
    -Wno-unused-variable
    -Wno-unused-but-set-variable
    -Wunreachable-code

    ; debug level 5=VERBOSE https://docs.platformio.org/en/latest/platforms/espressif32.html#debug-level
    ;  -DCORE_DEBUG_LEVEL=5


; ************
; * ESP32-C6 *
; ************
; devkitc-1: https://docs.espressif.com/projects/espressif-esp-dev-kits/en/latest/esp32c6/esp32-c6-devkitc-1/index.html
; devkitm-1: https://docs.espressif.com/projects/espressif-esp-dev-kits/en/latest/esp32c6/esp32-c6-devkitm-1/index.html

[env:esp32_c6_amoled_2_06]
extends = esp32c6
board = esp32-c6-n16
board_build.partitions = partitions/partitions_16mb_ota_phy.csv
board_build.variant = ${PIOENV}
board_build.variants_dir = variants
build_flags =
    ${esp32c6.build_flags}
    -D ARDUINO_ESP32_C6_AMOLED_2_06
    -D HAS_BUTTON
